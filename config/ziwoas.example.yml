# Copy to config/ziwoas.yml and edit to your setup.
electricity_price_eur_per_kwh: 0.32
timezone: Europe/Berlin

weather:
  lat: 52.52
  lon: 13.405

mqtt:
  host: 192.168.1.103
  port: 1883
  topic_prefix: shellies

# Solakon One – Null-Einspeisung (Steuerung per Modbus TCP).
# Ohne diesen Block ist die Regelung aus.
# solakon:
#   host: 192.168.1.50
